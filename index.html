<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #d8a1b0;
    text-align: center;
    color: #5a2a3a;
}

/* ===== INTRO SCREEN ===== */
#intro {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: linear-gradient(#f8e1e7, #d8a1b0);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.invite-box {
    text-align: center;
}

.invite-box h2 {
    font-family: 'Playfair Display', serif;
    margin-bottom: 20px;
    font-size: 28px;
}

.invite-box button {
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: #ff2e88;
    color: white;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 0 10px #ff2e88;
}

/* ===== MAIN CONTENT ===== */
.hero {
    min-height: 100vh;
    padding: 20px;

    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
}

/* ===== CIRCLE ===== */
.circle {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    overflow: hidden;
    margin: 20px auto;

    border: 4px solid #ff2e88;
    box-shadow: 0 0 30px #ff2e88;

    position: relative;
}

/* ===== IMAGE ===== */
.circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
}

/* ===== TEXT ===== */
.subtitle {
    font-size: 14px;
    letter-spacing: 2px;
    margin-top: 20px;
}

.title {
    font-family: 'Playfair Display', serif;
    font-size: 40px;
    margin: 15px 0;
}

.line {
    width: 60px;
    height: 2px;
    background: #ff2e88;
    margin: 10px auto;
}

.scroll {
    font-size: 14px;
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {

    .circle {
        width: 90vw;
        height: 90vw;
        border-width: 6px;
    }

    .title {
        font-size: 32px;
    }

    .subtitle {
        font-size: 16px;
    }

    .line {
        width: 100px;
        height: 3px;
    }
}

</style>
</head>

<body>

<!-- 🔥 INTRO SCREEN -->
<div id="intro">
    <div class="invite-box">
        <h2>Wedding Invitation</h2>
        <button onclick="openInvite()">Tap to Open</button>
    </div>
</div>

<!-- 🔥 MAIN CONTENT -->
<div id="mainContent" style="display: none;">

    <div class="hero">

        <div class="subtitle">THE WEDDING CELEBRATION</div>

        <div class="circle">
            <img src="photo.jpg" alt="Couple Photo">
        </div>

        <div class="title">Pradeep & Divya</div>

        <div class="line"></div>

        <div class="scroll">Scroll to explore ↓</div>

    </div>

</div>

<!-- 🔥 SCRIPT -->
<script>
function openInvite() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
}
</script>

</body>
</html>
